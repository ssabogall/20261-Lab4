AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MyBookStore — Stack 07: S3 Buckets
  Bucket de objetos (portadas de libros, trigger para Lambda procesarPortada)
  y bucket de frontend (React build estático, solo lectura via CloudFront OAC).

Parameters:
  ProjectName:
    Type: String
    Default: bookstore

  # Los nombres de bucket S3 deben ser globalmente únicos.
  # Se agrega el AccountId para garantizarlo.
  AccountId:
    Type: String
    Default: ""
    Description: >
      Tu AWS Account ID. Déjalo vacío para usar !Sub con AWS::AccountId.

Resources:

  # ── Bucket de objetos (portadas de libros) ──
  ObjectsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-objects-${AWS::AccountId}"
      # Bloquear acceso público — CloudFront accede via OAC
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
      # Notificación para Lambda procesarPortada
      # Se conecta en el stack 09-lambda.yaml para evitar dependencia circular
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: !Sub "${ProjectName}-objects"

  # ── Bucket del frontend (React build) ──
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-frontend-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: !Sub "${ProjectName}-frontend"

  # ── OAC (Origin Access Control) para CloudFront → S3 ──
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Política del bucket frontend — solo CloudFront puede leer
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${FrontendBucket.Arn}/*"

Outputs:
  ObjectsBucketName:
    Value: !Ref ObjectsBucket
    Export:
      Name: !Sub "${ProjectName}-ObjectsBucketName"

  ObjectsBucketArn:
    Value: !GetAtt ObjectsBucket.Arn
    Export:
      Name: !Sub "${ProjectName}-ObjectsBucketArn"

  FrontendBucketName:
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub "${ProjectName}-FrontendBucketName"

  FrontendBucketArn:
    Value: !GetAtt FrontendBucket.Arn
    Export:
      Name: !Sub "${ProjectName}-FrontendBucketArn"

  CloudFrontOACId:
    Value: !GetAtt CloudFrontOAC.Id
    Export:
      Name: !Sub "${ProjectName}-CloudFrontOACId"

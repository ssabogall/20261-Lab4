AWSTemplateFormatVersion: "2010-09-09"
Description: >
  MyBookStore - Stack 07: CloudFront
  Distribucion CDN con dos origins: S3 frontend (/) y ALB (/api/*).
  NOTA: AlbDnsName se obtiene despues de kubectl apply del ingress.

Parameters:
  ProjectName:
    Type: String
    Default: bookstore

  AlbDnsName:
    Type: String
    Description: >
      DNS del ALB creado por EKS Ingress.
      Obtener con: kubectl get ingress bookstore-ingress -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'

Resources:

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub "${ProjectName} Frontend S3 + API ALB"
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100

        Origins:
        # Origin 1: S3 bucket frontend
        - Id: S3FrontendOrigin
        DomainName: !Sub
          - "${BucketName}.s3.${AWS::Region}.amazonaws.com"
          - BucketName: !ImportValue
            Fn::Sub: "${ProjectName}-FrontendBucketName"
        S3OriginConfig: {}

          # Origin 2: ALB microservicios /api/*
          - Id: ALBOrigin
            DomainName: !Ref AlbDnsName
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: http-only

        CacheBehaviors:
          # /api/* va al ALB sin cache
          - PathPattern: "/api/*"
            TargetOriginId: ALBOrigin
            ViewerProtocolPolicy: redirect-to-https
            # CachingDisabled policy ID
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
            CachedMethods: [GET, HEAD]

        # Default: S3 React build
        DefaultCacheBehavior:
          TargetOriginId: S3FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https
          # CachingOptimized policy ID
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]

        # SPA fallback - React Router necesita esto
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

      Tags:
        - Key: Project
          Value: !Ref ProjectName

Outputs:
  CloudFrontDomain:
    Description: Dominio publico de la aplicacion
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${ProjectName}-CloudFrontDomain"

  CloudFrontId:
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${ProjectName}-CloudFrontId"

  AppUrl:
    Description: URL publica de MyBookStore
    Value: !Sub "https://${CloudFrontDistribution.DomainName}"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: 061709796715.dkr.ecr.us-east-1.amazonaws.com/bookstore-backend:latest
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: backend-secret
apiVersion: apps/v1
kind: Deployment
metadata:
  name: books-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: books-service
  template:
    metadata:
      labels:
        app: books-service
    spec:
      containers:
        - name: books-service
          # ACCOUNT_ID se reemplaza por deploy-all.sh antes de aplicar
          image: 261273955683.dkr.ecr.us-east-1.amazonaws.com/bookstore-books-service:latest
          ports:
            - containerPort: 5001
          env:
            - name: PORT
              value: "5001"
            - name: NODE_ENV
              value: "production"
            - name: AWS_REGION
              value: "us-east-1"
            - name: DYNAMO_TABLE
              valueFrom:
                secretKeyRef:
                  name: dynamo-secret
                  key: dynamo-table

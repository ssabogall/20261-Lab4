# ============================================================
# Backend - Deployment + Service
# Node.js / Express en puerto 5001
#
# ANTES DE APLICAR:
#   Reemplaza TU_ACCOUNT_ID con tu AWS Account ID real
#   (ejecútalo con: sed -i "s/TU_ACCOUNT_ID/$AWS_ACCOUNT_ID/g" backend-deployment.yaml)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: default
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Service Account con IAM Role para DynamoDB (creado con eksctl en Fase 5)
      serviceAccountName: bookstore-backend-sa
      containers:
        - name: backend
          image: TU_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/bookstore/backend:latest
          ports:
            - containerPort: 5001
          env:
            - name: NODE_ENV
              value: "production"
            - name: AWS_REGION
              value: "us-east-1"
            - name: PORT
              value: "5001"
          # Health checks - Kubernetes reinicia el pod si falla
          readinessProbe:
            httpGet:
              path: /api/books
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/books
              port: 5001
            initialDelaySeconds: 15
            periodSeconds: 10
          # Recursos - evita que un pod consuma todo el nodo
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

---

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
spec:
  selector:
    app: backend
  ports:
    - port: 5001
      targetPort: 5001
      protocol: TCP
  # ClusterIP = solo accesible dentro del clúster
  # El frontend se conecta a este servicio internamente
  type: ClusterIP
